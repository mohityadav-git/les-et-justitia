        /* Custom CSS beyond Tailwind */
        .font-serif {

        body {

            overflow-x: hidden;

        /* Subtle Background Animations */
        .bg-subtle-gradient {
            background: linear-gradient(135deg, #f8f6f2, #f5f3ef, #faf8f4, #f3f0ea);
            background-size: 300% 300%;
            animation: subtleBreath 25s ease infinite;
        }
        
        @keyframes subtleBreath {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .subtle-grid {
            background-image:

                linear-gradient(to bottom, rgba(163,126,44,0.03) 1px, transparent 1px);
            background-size: 60px 60px;

        }
        
        @keyframes gridDrift {

            100% { background-position: 80px 80px; }
        }

        .subtle-particles span {
            position: absolute;
            font-size: 18px;
            opacity: 0.08;
            font-family: 'Times New Roman', serif;
            color: #a37e2c;
            animation: particleDrift 60s linear infinite;
        }
        
        @keyframes particleDrift {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.08; }
            90% { opacity: 0.08; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }
        
        /* Page Transition */
        .page-fade {

        @keyframes pageFade {

            to { opacity: 1; transform: translateY(0); }

        { id: 7, category: "Constitutional", title: "The Preamble as a Guide for Corporate Social Responsibility.", excerpt: "Aligning the 'Fraternity' and 'Dignity' values of the Constitution with modern ESG frameworks.", fullContent: "The constitutional values of 'Fraternity' and 'Dignity' enshrined in the Preamble provide a philosophical foundation for ESG (Environmental, Social, Governance) initiatives. The Supreme Court has increasingly recognized that corporate entities, as constitutional citizens under Article 12, have obligations beyond profit maximization. ESG frameworks, when aligned with constitutional principles, become not just compliance tools but instruments for inclusive growth and social justice.", date: "Dec 15, 2025" },

                    ` : currentPage === 'expertise' ? `
                        <div class="page-fade py-16 md:py-24 bg-[#faf8f4]">
                            <div class="max-w-7xl mx-auto px-4 sm:px-6">
                                <div class="mb-10 md:mb-14 text-center"><span class="text-[#a37e2c] font-bold uppercase tracking-[0.4em] text-[9px] mb-3 block">Capabilities</span><h2 class="font-serif text-3xl md:text-5xl font-bold text-[#0f172a]">Practice Domains.</h2></div>
                                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 md:gap-6">
                                    ${PRACTICE_AREAS.map(area => `
                                        <div class="bg-white rounded-xl p-6 md:p-8 border border-gray-100 hover:shadow-xl transition-all group">
                                            <div class="text-[#a37e2c] mb-4 md:mb-5 text-3xl group-hover:scale-110 transition-transform"><i class="fas ${area.icon}"></i></div>
                                            <h3 class="font-serif text-lg md:text-xl font-bold text-[#0f172a] mb-2 md:mb-3">${area.title}</h3>
                                            <p class="text-gray-500 text-sm mb-4 md:mb-5">${area.description}</p>
                                            <div class="space-y-1.5 pt-4 border-t border-gray-100">
                                                ${area.services.map(s => `<div class="flex items-center gap-2 text-[10px] text-gray-400 font-semibold uppercase tracking-wider"><i class="fas fa-check-circle text-[#a37e2c] text-[8px]"></i> ${s}</div>`).join('')}
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    ` : currentPage === 'insights' ? `
                        <div class="page-fade py-16 md:py-24">
                            <div class="max-w-7xl mx-auto px-4 sm:px-6">
                                <div class="mb-10 md:mb-14 text-center"><span class="text-[#a37e2c] font-bold uppercase tracking-[0.4em] text-[9px] mb-3 block">Legal Registry</span><h2 class="font-serif text-3xl md:text-5xl font-bold text-[#0f172a]">Insights & Archive.</h2></div>
                                <div class="mb-8 md:mb-12 max-w-2xl mx-auto relative">
                                    <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-[#a37e2c] text-sm"></i>
                                    <input type="text" placeholder="Search Registry..." value="${searchQuery.replace(/"/g, '&quot;')}" oninput="setSearchQuery(this.value)" class="w-full bg-white border border-gray-200 rounded-full py-4 pl-12 pr-5 text-base outline-none focus:shadow-md transition-all" />
                                </div>
                                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 md:gap-12">
                                    <div class="lg:col-span-2 space-y-5 md:space-y-6">
                                        ${filteredInsights.map(i => `
                                            <article class="bg-white rounded-xl border border-gray-100 overflow-hidden shadow-sm hover:shadow-md transition-all">
                                                <div class="p-5 md:p-6 cursor-pointer" onclick="toggleInsight(${i.id})">
                                                    <div class="flex gap-4 md:gap-5 items-start">
                                                        <div class="text-center min-w-[44px]"><span class="block text-xl md:text-2xl font-serif font-bold text-[#0f172a] opacity-30">0${i.id}</span><span class="text-[7px] md:text-[8px] uppercase tracking-wider font-bold text-[#a37e2c]">${i.category}</span></div>
                                                        <div class="flex-1 min-w-0">
                                                            <h3 class="font-serif text-base md:text-xl font-bold text-[#0f172a] hover:text-[#a37e2c] transition-colors leading-snug">${i.title}</h3>
                                                            <p class="text-gray-500 text-xs md:text-sm mt-1">${i.excerpt}</p>
                                                            <div class="flex flex-wrap items-center gap-3 mt-3">
                                                                <span class="text-[9px] uppercase tracking-wider text-gray-400">${i.date}</span>
                                                                <span class="text-[10px] text-[#a37e2c] font-semibold flex items-center gap-1"><i class="fas fa-chevron-down text-[8px]"></i> Read full analysis</span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div class="insight-content ${expandedInsights[i.id] ? 'expanded' : ''} px-5 md:px-6 pb-5 md:pb-6">
                                                    <div class="mt-2 pt-4 border-t border-gray-100">
                                                        <p class="text-gray-600 text-sm leading-relaxed">${i.fullContent}</p>
                                                        <div class="mt-4 flex justify-end">
                                                            <button onclick="event.stopPropagation(); toggleInsight(${i.id})" class="text-[10px] text-[#a37e2c] font-semibold uppercase tracking-wider">Collapse <i class="fas fa-chevron-up text-[8px]"></i></button>
                                                        </div>
                                                    </div>
                                                </div>
                                            </article>
                                        `).join('')}
                                    </div>
                                    <div class="order-first lg:order-last mb-6 lg:mb-0"><div class="bg-[#0f172a] rounded-xl p-6 md:p-8 text-white lg:sticky lg:top-24"><h4 class="font-serif text-xl mb-4 uppercase tracking-wide">Archive Protocol</h4><p class="text-sm opacity-60 leading-relaxed mb-6">Substantive legal analysis intended for professional strategic foresight. Click any insight to read the complete legal commentary.</p><div class="grid grid-cols-2 lg:grid-cols-1 gap-2 lg:space-y-3"><div class="flex items-center gap-2 text-[9px] font-bold uppercase text-[#a37e2c]"><i class="fas fa-chevron-right text-[8px]"></i> Constitutional Law</div><div class="flex items-center gap-2 text-[9px] font-bold uppercase text-[#a37e2c]"><i class="fas fa-chevron-right text-[8px]"></i> IBC Recalibration</div><div class="flex items-center gap-2 text-[9px] font-bold uppercase text-[#a37e2c]"><i class="fas fa-chevron-right text-[8px]"></i> Arbitration & ADR</div><div class="flex items-center gap-2 text-[9px] font-bold uppercase text-[#a37e2c]"><i class="fas fa-chevron-right text-[8px]"></i> PMLA Guidelines</div></div></div></div>
                                </div>
                            </div>
                        </div>
                    ` : `
                        <div class="page-fade py-16 md:py-24">
                            <div class="max-w-7xl mx-auto px-4 sm:px-6">
                                <div class="mb-10 md:mb-14 text-center"><span class="text-[#a37e2c] font-bold uppercase tracking-[0.4em] text-[9px] mb-3 block">Senior Council</span><h2 class="font-serif text-3xl md:text-5xl font-bold text-[#0f172a]">Advocates of the Registry.</h2></div>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12 max-w-5xl mx-auto">
                                    ${PARTNERS.map(p => `
                                        <div class="counsel-card bg-white rounded-2xl shadow-lg hover:shadow-xl transition-all border border-gray-100 overflow-hidden">
                                            <div class="relative h-32 bg-gradient-to-r from-[#0f172a] to-[#1e2a3a] flex items-center justify-center">
                                                <div class="absolute -bottom-12 left-8">
                                                    <div class="w-24 h-24 rounded-full bg-white shadow-lg flex items-center justify-center border-4 border-[#a37e2c]">
                                                        <i class="fas fa-balance-scale text-4xl text-[#a37e2c]"></i>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="pt-16 p-8">
                                                <h3 class="font-serif text-2xl font-bold text-[#0f172a] mb-1">${p.name}</h3>
                                                <p class="text-[10px] uppercase tracking-wider text-[#a37e2c] font-bold mb-4">${p.role}</p>
                                                <p class="text-gray-600 text-sm leading-relaxed mb-6">"${p.bio}"</p>
                                                <div class="flex flex-wrap gap-4 pt-4 border-t border-gray-100">
                                                    <a href="${p.linkedin}" target="_blank" class="flex items-center gap-2 text-xs text-gray-500 hover:text-[#0077b5] transition-colors"><i class="fab fa-linkedin-in"></i> LinkedIn</a>
                                                    <a href="${p.phone}" class="flex items-center gap-2 text-xs text-gray-500 hover:text-[#0f172a] transition-colors"><i class="fas fa-phone-alt"></i> Direct Call</a>
                                                    <a href="${p.whatsapp}" target="_blank" class="flex items-center gap-2 text-xs text-gray-500 hover:text-[#25D366] transition-colors"><i class="fab fa-whatsapp"></i> WhatsApp</a>
                                                </div>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    `}
                </main>
                
                <!-- Footer -->
                <footer class="relative py-14 md:py-20 mt-8 md:mt-16 bg-[#0f172a]">
                    <div class="relative z-10 max-w-6xl w-full mx-auto px-4 sm:px-6 text-center text-white">
                        <div class="mb-8 md:mb-12"><h2 class="font-serif text-2xl md:text-5xl font-bold tracking-tight uppercase mb-4">Lex et Justitia</h2><div class="h-px w-24 bg-[#a37e2c] mx-auto mb-5"></div><span class="text-[10px] md:text-xs uppercase tracking-[0.4em] text-[#a37e2c] font-semibold">Strategy Recalibrated. Justice Perfected.</span></div>
                        <div class="flex flex-wrap justify-center gap-6 md:gap-8 text-[10px] font-bold uppercase tracking-wider mb-8 md:mb-12"><a href="${LINKEDIN_FIRM}" target="_blank" class="hover:text-[#a37e2c] flex items-center gap-2 transition-colors"><i class="fab fa-linkedin-in"></i> Institutional LinkedIn</a><a href="${PORTFOLIO_PDF}" class="hover:text-[#a37e2c] flex items-center gap-2 transition-colors"><i class="fas fa-download"></i> Portfolio PDF</a><button onclick="setCurrentPage('insights')" class="hover:text-[#a37e2c] transition-colors">Insights Archive</button></div>
                        <div class="max-w-4xl mx-auto"><div class="p-6 md:p-8 border-l-4 border-[#a37e2c] bg-[#0f172a]/80 text-left"><h5 class="font-serif text-[#a37e2c] text-base md:text-lg mb-3 md:mb-4 uppercase font-bold">Regulatory Mandate</h5><p class="text-[10px] md:text-xs text-gray-400 uppercase tracking-wider leading-relaxed">In absolute compliance with the rules of the Bar Council of India, this digital registry serves an informational purpose exclusively. Access to this platform does not establish an attorney-client relationship, nor does it constitute an invitation, solicitation, or inducement to initiate legal engagement.</p></div><p class="text-[9px] text-gray-500 uppercase tracking-[0.4em] font-semibold mt-6 md:mt-8">&copy; 2026 Lex et Justitia | Constitutional Integrity Reserved.</p></div>
                    </div>
                </footer>
            </div>
        `;
        
        root.innerHTML = html;
    }
    
    window.setCurrentPage = setCurrentPage;
    window.setSearchQuery = setSearchQuery;
    window.toggleInsight = toggleInsight;
    window.toggleMobileMenu = toggleMobileMenu;
    
    renderApp();
</script>

</body>
</html>
